<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovable Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    body { background: #0f0f0f; color: #e5e7eb; font-family: 'Inter', system-ui, sans-serif; }
    .hljs { background: #1a1a2e !important; border-radius: 8px; }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #374151; border-radius: 2px; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-active { border-bottom: 2px solid #8b5cf6; color: #8b5cf6; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const LOVABLE_SYSTEM_PROMPT = `You are Lovable, an expert AI programming assistant that primarily focuses on building beautiful, functional React applications.

You always use the following tech stack:
- Vite as build tool
- React with TypeScript
- shadcn/ui components
- Tailwind CSS for styling
- Lucide React for icons

IMPORTANT RULES:
1. Create complete, working React applications. Always include all necessary imports.
2. Use TypeScript for type safety.
3. Style with Tailwind CSS classes - never write custom CSS unless absolutely necessary.
4. Use shadcn/ui components (Button, Card, Input, etc.) when appropriate.
5. Use Lucide React for icons (import { IconName } from 'lucide-react').
6. Make the UI beautiful, modern, clean, and fully responsive.
7. Add proper TypeScript interfaces and types.
8. Keep components focused and well-organized.
9. Use React hooks properly (useState, useEffect, useCallback, useMemo).
10. Handle loading states, empty states, and error states gracefully.

When generating code:
- Generate a single complete App.tsx file that is fully functional
- Include all imports at the top
- Export default the main component
- Make it visually impressive with gradients, shadows, and modern design
- DO NOT use placeholder images - use solid colors or SVG illustrations
- Always add hover effects and smooth transitions

Output ONLY the code, no explanations. Start directly with the imports.`;

    const PROVIDERS = {
      openai: {
        label: 'OpenAI',
        color: '#10a37f',
        baseUrl: 'https://api.openai.com/v1',
        keyPlaceholder: 'sk-proj-...',
        keyHint: 'platform.openai.com/api-keys',
        badge: null,
        models: [
          { id: 'gpt-4o', label: 'GPT-4o' },
          { id: 'gpt-4o-mini', label: 'GPT-4o Mini (rapido)' },
          { id: 'gpt-4-turbo', label: 'GPT-4 Turbo' },
        ]
      },
      groq: {
        label: 'Groq',
        color: '#f55036',
        baseUrl: 'https://api.groq.com/openai/v1',
        keyPlaceholder: 'gsk_...',
        keyHint: 'console.groq.com/keys',
        badge: 'GRATIS',
        models: [
          { id: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B' },
          { id: 'qwen-2.5-coder-32b', label: 'Qwen 2.5 Coder 32B' },
          { id: 'llama-3.1-8b-instant', label: 'Llama 3.1 8B (ultra rapido)' },
          { id: 'mixtral-8x7b-32768', label: 'Mixtral 8x7B' },
        ]
      },
    };

    const PROVIDER_ORDER = ['openai', 'groq'];

    function CopyButton({ text }) {
      const [copied, setCopied] = useState(false);
      const copy = () => { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); };
      return (<button onClick={copy} className="flex items-center gap-1.5 px-3 py-1.5 text-xs bg-gray-700 hover:bg-gray-600 text-gray-300 rounded-md transition-colors">{copied ? 'Copiado' : 'Copiar'}</button>);
    }

    function CodeBlock({ code }) {
      const ref = useRef(null);
      useEffect(() => { if (ref.current) { ref.current.textContent = code; hljs.highlightElement(ref.current); } }, [code]);
      return (<div className="relative group"><div className="absolute top-3 right-3 z-10 opacity-0 group-hover:opacity-100 transition-opacity"><CopyButton text={code} /></div><pre className="overflow-auto max-h-[calc(100vh-280px)] text-sm"><code ref={ref} className="language-tsx"></code></pre></div>);
    }

    function Message({ msg }) {
      const isUser = msg.role === 'user';
      return (<div className={`flex gap-3 fade-in ${isUser ? 'flex-row-reverse' : 'flex-row'}`}><div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${isUser ? 'bg-violet-600 text-white' : 'bg-gradient-to-br from-violet-500 to-pink-500 text-white'}`}>{isUser ? 'V' : 'L'}</div><div className={`max-w-[85%] px-4 py-3 rounded-2xl text-sm leading-relaxed ${isUser ? 'bg-violet-600 text-white rounded-tr-none' : 'bg-gray-800 text-gray-200 rounded-tl-none'}`}>{msg.content}</div></div>);
    }

    function ProviderSetup({ onReady }) {
      const [provider, setProvider] = useState('groq');
      const [keys, setKeys] = useState({ openai: '', groq: '' });
      const [model, setModel] = useState(PROVIDERS.groq.models[0].id);
      const [error, setError] = useState('');
      const p = PROVIDERS[provider];
      const handleProviderChange = (id) => { setProvider(id); setModel(PROVIDERS[id].models[0].id); setError(''); };
      const handleStart = () => {
        const key = keys[provider].trim();
        if (!key) { setError('Insira a chave API.'); return; }
        setError('');
        onReady({ provider, apiKey: key, model });
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-6">
          <div className="w-full max-w-md fade-in">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-gradient-to-br from-violet-500 to-pink-500 rounded-2xl mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-white">L</div>
              <h1 className="text-2xl font-bold text-white mb-1">Lovable Generator</h1>
              <p className="text-gray-400 text-sm">Gerador de apps React com o sistema do Lovable</p>
            </div>
            <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 space-y-5">
              <div>
                <label className="text-sm text-gray-400 mb-2 block">Provedor</label>
                <div className="grid grid-cols-2 gap-3">
                  {PROVIDER_ORDER.map(id => {
                    const pv = PROVIDERS[id];
                    const isActive = provider === id;
                    return (
                      <button key={id} onClick={() => handleProviderChange(id)}
                        style={isActive ? { background: pv.color, borderColor: pv.color } : {}}
                        className={`relative py-3 px-4 rounded-xl text-sm font-semibold border transition-all text-left ${isActive ? 'text-white' : 'border-gray-700 text-gray-400 hover:border-gray-500 hover:text-gray-200 bg-gray-800'}`}>
                        {pv.label}
                        {pv.badge && (
                          <span className={`absolute top-1.5 right-1.5 text-[9px] font-bold px-1.5 py-0.5 rounded-full ${isActive ? 'bg-white/20 text-white' : 'bg-green-500/20 text-green-400'}`}>
                            {pv.badge}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
                {provider === 'groq' && (
                  <div className="mt-3 bg-green-500/10 border border-green-500/20 rounded-xl p-3">
                    <p className="text-xs text-green-400 font-medium">Groq e 100% gratuito</p>
                    <p className="text-xs text-green-400/70 mt-0.5">Crie sua chave em console.groq.com/keys - sem cartao de credito</p>
                  </div>
                )}
              </div>
              <div>
                <label className="text-sm text-gray-400 mb-2 block">Chave API - {p.label}</label>
                <input type="password" value={keys[provider]}
                  onChange={e => setKeys(prev => ({ ...prev, [provider]: e.target.value }))}
                  onKeyDown={e => e.key === 'Enter' && handleStart()}
                  placeholder={p.keyPlaceholder} autoFocus
                  className="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-violet-500 transition-colors text-sm" />
                <p className="text-xs text-gray-500 mt-1.5">{p.keyHint} - fica so no seu navegador</p>
              </div>
              <div>
                <label className="text-sm text-gray-400 mb-2 block">Modelo</label>
                <select value={model} onChange={e => setModel(e.target.value)}
                  className="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-violet-500 transition-colors text-sm">
                  {p.models.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                </select>
              </div>
              {error && <p className="text-red-400 text-xs">{error}</p>}
              <button onClick={handleStart}
                className="w-full bg-gradient-to-r from-violet-600 to-pink-600 hover:from-violet-500 hover:to-pink-500 text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-[1.01]">
                Comecar
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [messages, setMessages] = useState([{ role: 'assistant', content: 'Ola! Descreva o app React que voce quer criar e eu vou gerar o codigo completo.' }]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [generatedCode, setGeneratedCode] = useState('');
      const [activeTab, setActiveTab] = useState('code');
      const [error, setError] = useState('');
      const chatRef = useRef(null);

      useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages, loading]);

      const sendMessage = useCallback(async () => {
        if (!input.trim() || loading || !session) return;
        const userMsg = input.trim(); setInput(''); setError('');
        const newMessages = [...messages, { role: 'user', content: userMsg }];
        setMessages(newMessages); setLoading(true);
        const { provider, apiKey, model } = session;
        const p = PROVIDERS[provider];
        try {
          const response = await fetch(`${p.baseUrl}/chat/completions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
            body: JSON.stringify({ model, messages: [{ role: 'system', content: LOVABLE_SYSTEM_PROMPT }, ...newMessages.map(m => ({ role: m.role, content: m.content }))], max_tokens: 4096, temperature: 0.7 })
          });
          if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || `Erro ${response.status}`); }
          const data = await response.json();
          const assistantMsg = data.choices[0].message.content;
          setMessages(prev => [...prev, { role: 'assistant', content: 'Codigo gerado! Veja no painel a direita.' }]);
          const codeMatch = assistantMsg.match(/```(?:tsx?|jsx?)?\n?([\s\S]*?)```/);
          setGeneratedCode(codeMatch ? codeMatch[1].trim() : assistantMsg.trim());
          setActiveTab('code');
        } catch (e) { setError(e.message); setMessages(prev => [...prev, { role: 'assistant', content: `Erro: ${e.message}` }]); }
        finally { setLoading(false); }
      }, [input, loading, messages, session]);

      const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
      const EXAMPLES = ['Dashboard de analytics com graficos', 'App de tarefas Kanban', 'Landing page para SaaS', 'Timer Pomodoro com historico'];

      if (!session) return <ProviderSetup onReady={setSession} />;
      const p = PROVIDERS[session.provider];

      return (
        <div className="flex h-screen overflow-hidden">
          <div className="w-[380px] flex-shrink-0 flex flex-col border-r border-gray-800 bg-gray-950">
            <div className="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 bg-gradient-to-br from-violet-500 to-pink-500 rounded-lg flex items-center justify-center text-xs font-bold text-white">L</div>
                <span className="font-semibold text-white text-sm">Lovable Generator</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs px-2 py-1 rounded-lg font-medium" style={{ background: p.color + '22', color: p.color }}>{p.label}</span>
                <select value={session.model} onChange={e => setSession(prev => ({ ...prev, model: e.target.value }))}
                  className="text-xs bg-gray-800 border border-gray-700 text-gray-400 rounded-lg px-2 py-1 focus:outline-none max-w-[130px]">
                  {p.models.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                </select>
                <button onClick={() => setSession(null)} className="text-xs text-gray-500 hover:text-gray-300" title="Trocar provedor">chave</button>
              </div>
            </div>
            <div ref={chatRef} className="flex-1 overflow-y-auto chat-scroll px-4 py-4 space-y-4">
              {messages.map((m, i) => <Message key={i} msg={m} />)}
              {loading && (
                <div className="flex gap-3 fade-in">
                  <div className="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-pink-500 flex items-center justify-center text-sm font-bold flex-shrink-0">L</div>
                  <div className="bg-gray-800 px-4 py-3 rounded-2xl rounded-tl-none flex items-center gap-2">
                    <svg className="spinner w-4 h-4 text-violet-400" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="31.4" strokeDashoffset="10" strokeLinecap="round"/></svg>
                    <span className="text-sm text-gray-400">Gerando via {p.label}...</span>
                  </div>
                </div>
              )}
            </div>
            <div className="px-4 py-3 border-t border-gray-800">
              {error && <p className="text-red-400 text-xs mb-2">{error}</p>}
              <div className="flex gap-2 items-end">
                <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
                  placeholder="Descreva o app que voce quer criar..." rows={2}
                  className="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-violet-500 resize-none" />
                <button onClick={sendMessage} disabled={loading || !input.trim()}
                  className="w-10 h-10 bg-violet-600 hover:bg-violet-500 disabled:bg-gray-700 text-white rounded-xl transition-colors flex items-center justify-center flex-shrink-0">
                  {loading ? <svg className="spinner w-4 h-4" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeDasharray="31.4" strokeDashoffset="10" strokeLinecap="round"/></svg> : '->'}
                </button>
              </div>
              <p className="text-xs text-gray-600 mt-1.5">Enter envia - Shift+Enter nova linha</p>
            </div>
          </div>
          <div className="flex-1 flex flex-col bg-gray-900">
            <div className="flex border-b border-gray-800 px-4">
              {['code', 'help'].map(tab => (
                <button key={tab} onClick={() => setActiveTab(tab)}
                  className={`px-4 py-3 text-sm font-medium transition-colors ${activeTab === tab ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}`}>
                  {tab === 'code' ? 'Codigo' : 'Ajuda'}
                </button>
              ))}
              {generatedCode && <div className="ml-auto flex items-center py-2"><CopyButton text={generatedCode} /></div>}
            </div>
            <div className="flex-1 overflow-auto p-4">
              {activeTab === 'code' ? (
                generatedCode ? <CodeBlock code={generatedCode} /> : (
                  <div className="h-full flex flex-col items-center justify-center text-center space-y-4">
                    <div className="text-5xl text-gray-700">L</div>
                    <div><p className="text-lg font-medium text-gray-500">Nenhum codigo gerado</p><p className="text-sm text-gray-600 mt-1">Descreva um app para comecar</p></div>
                    <div className="grid grid-cols-2 gap-3 mt-2 text-xs max-w-sm">
                      {EXAMPLES.map(ex => <button key={ex} onClick={() => setInput(ex)} className="bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 text-gray-400 hover:text-gray-200 transition-colors text-left">{ex}</button>)}
                    </div>
                  </div>
                )
              ) : (
                <div className="max-w-2xl space-y-5 text-sm text-gray-400">
                  <h2 className="text-white font-bold text-lg">Como usar</h2>
                  <div className="bg-gray-800 rounded-xl p-4 space-y-2">
                    <p><strong className="text-violet-400">1.</strong> Escolha o provedor e insira a chave API</p>
                    <p><strong className="text-violet-400">2.</strong> Descreva o app (funcionalidades, visual, dados)</p>
                    <p><strong className="text-violet-400">3.</strong> Copie o App.tsx para um projeto Vite+React+Tailwind</p>
                    <p><strong className="text-violet-400">4.</strong> Peca ajustes no chat - o contexto e mantido</p>
                  </div>
                  <div className="bg-green-500/10 border border-green-500/20 rounded-xl p-4">
                    <p className="text-green-400 font-medium text-sm">Usar de graca com Groq</p>
                    <p className="text-green-400/70 text-xs mt-1">Crie conta em console.groq.com, gere uma chave e use o Qwen 2.5 Coder 32B - excelente para codigo.</p>
                  </div>
                  <h3 className="text-white font-semibold">Modelos disponiveis</h3>
                  <div className="space-y-3">
                    {PROVIDER_ORDER.map(id => { const pv = PROVIDERS[id]; return (
                      <div key={id} className="bg-gray-800 rounded-xl p-3">
                        <div className="flex items-center gap-2 mb-2">
                          <span className="text-xs px-2 py-1 rounded-lg font-semibold" style={{ background: pv.color + '22', color: pv.color }}>{pv.label}</span>
                          {pv.badge && <span className="text-xs text-green-400 font-medium">{pv.badge}</span>}
                        </div>
                        <ul className="space-y-1">{pv.models.map(m => <li key={m.id} className="text-xs text-gray-400">- {m.label}</li>)}</ul>
                      </div>
                    ); })}
                  </div>
                  <p className="text-gray-600 text-xs">Stack: React 18 + TypeScript + Tailwind CSS + shadcn/ui + Lucide React</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
